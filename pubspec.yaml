name: quran_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.8.0+1
  json_annotation: ^4.9.0
  flutter_bloc: ^9.1.1
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  json_serializable: ^6.8.0
  build_runner: ^2.4.13
 

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icons/dev/
    - assets/icons/stg/
    - assets/icons/prod/

# ─────────────────────────────────────────
# Flutter Launcher Icons – per-flavor config
# ─────────────────────────────────────────
flutter_launcher_icons:
  # Default fallback (prod)
  image_path: "assets/icons/prod/icon.jpeg"
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/prod/icon.jpeg"

flutter_launcher_icons_dev:
  image_path: "assets/icons/dev/icon.jpeg"
  android: "launcher_icon"
  ios: true
  flavor: dev
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#1565C0"
  adaptive_icon_foreground: "assets/icons/dev/icon.jpeg"

flutter_launcher_icons_stg:
  image_path: "assets/icons/stg/icon.jpeg"
  android: "launcher_icon"
  ios: true
  flavor: stg
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#FF6F00"
  adaptive_icon_foreground: "assets/icons/stg/icon.jpeg"

flutter_launcher_icons_prod:
  image_path: "assets/icons/prod/icon.jpeg"
  android: "launcher_icon"
  ios: true
  flavor: prod
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#2E7D32"
  adaptive_icon_foreground: "assets/icons/prod/icon.jpeg"
